<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12203a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- barrier pole -->
  <rect x="120" y="150" width="26" height="230" rx="8" fill="#8ea0c4"/>
  <!-- boom barrier (red/white) -->
  <g transform="rotate(-20 146 168)">
    <rect x="146" y="150" width="240" height="34" rx="12" fill="#e8eefc"/>
    <rect x="146" y="150" width="48" height="34" fill="#ff5a5a"/>
    <rect x="242" y="150" width="48" height="34" fill="#ff5a5a"/>
    <rect x="338" y="150" width="48" height="34" fill="#ff5a5a"/>
  </g>
  <!-- camera -->
  <g transform="translate(300 300)">
    <rect x="0" y="0" width="150" height="92" rx="18" fill="#131d33" stroke="#37d67a" stroke-width="8"/>
    <circle cx="60" cy="46" r="30" fill="#0b1220" stroke="#37d67a" stroke-width="8"/>
    <circle cx="60" cy="46" r="12" fill="#37d67a"/>
    <circle cx="118" cy="26" r="7" fill="#37d67a"/>
  </g>
  <!-- live dot -->
  <circle cx="150" cy="410" r="16" fill="#37d67a"/>
</svg>
