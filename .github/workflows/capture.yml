name: Saatlik yakalama

on:
  schedule:
    # GitHub cron onbetrouwbaar (vertraagt/slaat runs over onder belasting).
    # Daarom elke 20 min i.p.v. 1x/uur -> veel grotere kans dat elk uur gedekt is.
    # Frames worden per UTC-uur gebucket, dus dit blijft ~1 foto per uur.
    - cron: '*/20 * * * *'   # elke 20 minuten (UTC)
  workflow_dispatch: {}      # elle de tetiklenebilir

# Aynı anda tek çalışsın
concurrency:
  group: capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ffmpeg kur
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg

      - name: bağımlılıklar
        working-directory: capture
        run: npm install --no-audit --no-fund

      - name: yakala
        working-directory: capture
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node capture.mjs

      - name: bekleme süreleri (borderalarm)
        working-directory: capture
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node waits.mjs
