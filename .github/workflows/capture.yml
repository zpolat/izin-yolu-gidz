name: Saatlik yakalama

on:
  schedule:
    - cron: '5 * * * *'   # her saatin 5. dakikası (UTC)
  workflow_dispatch: {}    # elle de tetiklenebilir

# Aynı anda tek çalışsın
concurrency:
  group: capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ffmpeg kur
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg

      - name: bağımlılıklar
        working-directory: capture
        run: npm install --no-audit --no-fund

      - name: yakala
        working-directory: capture
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node capture.mjs
